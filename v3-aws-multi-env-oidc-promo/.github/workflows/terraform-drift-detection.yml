name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    defaults:
      run:
        shell: bash
        working-directory: live/${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-terraform-drift-${{ github.event.inputs.environment || 'dev' }}
      - run: terraform init -backend-config=backend.hcl
      - name: Terraform refresh-only drift check
        id: drift
        run: |
          set +e
          terraform plan -refresh-only -detailed-exitcode -no-color > drift.txt
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          cat drift.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-drift-report-${{ github.event.inputs.environment || 'dev' }}
          path: live/${{ github.event.inputs.environment || 'dev' }}/drift.txt
      - if: steps.drift.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const envName = '${{ github.event.inputs.environment || 'dev' }}';
            const body = fs.readFileSync(`live/${envName}/drift.txt`, 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Terraform drift detected in ${envName}`,
              body: [
                `Terraform drift was detected in ${envName}.`,
                '',
                '```',
                body.slice(0, 60000),
                '```'
              ].join('\n')
            });
