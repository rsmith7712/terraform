name: Terraform Validate Security Cost

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  validate-dev:
    name: Validate Dev
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: live/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-terraform-validate-dev

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Export plan to JSON
        run: terraform show -json tfplan > plan.json

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: live/dev
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          quiet: true
          soft_fail: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: live/dev/checkov.sarif

      - name: Setup Infracost
        uses: infracost/actions/setup@v3

      - name: Generate Infracost report
        if: github.event_name == 'pull_request'
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          infracost breakdown --path . --format json --out-file infracost.json

      - name: Post Infracost comment
        if: github.event_name == 'pull_request'
        uses: infracost/actions/comment@v1
        with:
          path: live/dev/infracost.json
          behavior: update
