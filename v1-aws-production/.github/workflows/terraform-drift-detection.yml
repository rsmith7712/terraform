name: Terraform Drift Detection

# A scheduled workflow can detect configuration drift by running
# terraform plan -detailed-exitcode. Exit code 0 means no changes,
# 2 means changes present, and refresh-only mode is used for
# state-to-reality comparison without trying to mutate infrastructure
# during the drift check.

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_WORKING_DIR: live/prod
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  drift-detection:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-terraform-drift

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform refresh-only drift check
        id: drift
        run: |
          set +e
          terraform plan -refresh-only -detailed-exitcode -no-color > drift.txt
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          cat drift.txt
          exit 0

      - name: Upload drift report artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-drift-report
          path: ${{ env.TF_WORKING_DIR }}/drift.txt

      - name: Create GitHub issue if drift detected
        if: steps.drift.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('${{ env.TF_WORKING_DIR }}/drift.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Terraform drift detected in live/prod',
              body: [
                'Terraform drift was detected by the scheduled workflow.',
                '',
                '```',
                body.slice(0, 60000),
                '```'
              ].join('\n')
            });